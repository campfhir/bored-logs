# Local Postgres for the live end-to-end tests (`pnpm test:e2e`).
#
#   pnpm db:up      # start + wait until healthy
#   pnpm test:e2e   # run the live suite against it
#   pnpm db:down    # stop and delete the volume
#
# Host port is 5433 (not the default 5432) so it won't clash with a Postgres
# you may already run locally. Override the connection with DATABASE_URL.
services:
  postgres:
    image: postgres:16-alpine
    container_name: bored-logs-test-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bored_logs_test
    ports:
      - "5433:5432"
    # Keep the test DB entirely in memory — faster, and nothing to clean up.
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bored_logs_test"]
      interval: 1s
      timeout: 3s
      retries: 30
